# ==========================================
# Jenkins Docker 部署配置
# 部署位置: 47.102.202.180 /tsingli/admin/
# 用途: 自动化构建 + 部署 web-antd 项目
# ==========================================

version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: tsingli-jenkins:latest
    container_name: jenkins
    restart: always
    ports:
      - "8090:8080"      # Jenkins Web UI 端口
      - "50000:50000"    # Jenkins Agent 通信端口
    volumes:
      # Jenkins 持久化数据（配置、插件、Job）
      - jenkins_home:/var/jenkins_home
      # 挂载 Docker 套接字，让 Jenkins 容器内可以使用宿主机的 Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载 Docker 二进制
      - /usr/bin/docker:/usr/bin/docker
      # 时区
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Duser.timezone=Asia/Shanghai
    user: root   # 必须 root 才能访问 docker.sock

volumes:
  jenkins_home:
    driver: local